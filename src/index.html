<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- cssStylesheet -->
    <link rel="stylesheet" href="./css/output.css">
    <!-- font_download -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- fontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>HomeWork4</title>
</head>

<body>
    <div class="w-full min-h-screen bg-transparent relative">
        <!-- hidden -->

        <!-- ADD -->
        <div id="formAdd"
            class="absolute w-full min-h-screen items-center justify-center z-10 top-0 left-0 bg-opacity-50 bg-gray-700 backdrop-blur-sm hidden ">

            <form class="z-40 w-1/3 flex flex-col space-y-4 p-10 bg-white rounded-3xl">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-bold text-center">Add Task</h2>
                    <div id="exits" class="text-gray-500 hover:text-gray-700 border border-black">
                        <i class="fas fa-times"></i>
                    </div>
                </div>
                <label for="taskName" class="text-xl font-bold">Task:</label>
                <input type="text" id="taskName"
                    class="border border-blue-500 rounded-md p-2 focus:outline-none  focus:ring-blue-500 w-2/3"
                    placeholder="Web homework">
                <h2 class="text-2xl font-bold">Priority: </h2>
                <div class="flex gap-4">
                    <div onclick="selectedPriority('high')"
                        class="priority high cursor-pointer px-6 py-2 rounded-full border-2 border-red-500 text-red-500 hover:text-white hover:bg-red-600 transition-all duration-200">
                        High
                    </div>
                    <div onclick="selectedPriority('medium')"
                        class="priority medium cursor-pointer px-6 py-2 rounded-full border-2 border-yellow-400 text-yellow-600  hover:text-white hover:bg-yellow-400 transition-all duration-200">
                        Medium
                    </div>
                    <div onclick="selectedPriority('low')"
                        class="priority low cursor-pointer px-6 py-2 rounded-full border-2 border-green-500 text-green-500 hover:text-white hover:bg-green-500 transition-all duration-200">
                        Low
                    </div>
                </div>
                <h2 class="text-2xl font-bold">Status: </h2>
                <div class="flex gap-4">
                    <div id="todo" onclick="selectedStatus()"
                        class="status cursor-pointer px-6 py-2 rounded-full border-2 border-blue-300 text-blue-300 hover:text-white hover:bg-blue-300 transition-all duration-200">
                        Todo
                    </div>
                    <div id="progress" onclick="selectedStatus()"
                        class="status cursor-pointer px-6 py-2 rounded-full border-2 border-blue-300 text-blue-300 hover:text-white hover:bg-blue-300 transition-all duration-200">
                        Progress
                    </div>
                    <div id="done" onclick="selectedStatus()"
                        class="status cursor-pointer px-6 py-2 rounded-full border-2 border-blue-300 text-blue-300 hover:text-white hover:bg-blue-300 transition-all duration-200  ">
                        Done
                    </div>
                </div>

                <div class="flex justify-end ">
                    <div id="btnAddNewTask"
                        class="btn bg-blue-300 font-bold font-xl rounded-lg px-5 py-3 text-white border text-center border-transparent hover:text-blue-400 hover:bg-transparent hover:border-blue-400 hover:border transition-all duration-150 ">
                        Add Task </div>
                </div>

            </form>
        </div>
        <!-- END ADD -->

        <!-- UPDATE -->
        <div id="formUpdate"
            class="absolute w-full min-h-screen items-center justify-center z-10 top-0 left-0 bg-opacity-50 bg-gray-700 backdrop-blur-sm hidden ">

            <form class="z-40 w-1/3 flex flex-col space-y-4 p-10 bg-white rounded-3xl">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-bold text-center">Update Task</h2>
                    <div id="exits" class="text-gray-500 hover:text-gray-700 border border-black">

                    </div>
                </div>
                <label for="taskName" class="text-xl font-bold">Task:</label>
                <input type="text" id="updateTaskName"
                    class="border border-blue-500 rounded-md p-2 focus:outline-none  focus:ring-blue-500 w-2/3"
                    placeholder="Web homework">
                <h2 class="text-2xl font-bold">Priority: </h2>
                <div class="flex gap-4">
                    <div id="uhigh" onclick="selectedPriority('high')"
                        class="priority cursor-pointer px-6 py-2 rounded-full border-2 border-red-500 text-red-500 hover:text-white hover:bg-red-600 transition-all duration-200">
                        High
                    </div>
                    <div id="umedium" onclick="selectedPriority('medium')"
                        class="priority cursor-pointer px-6 py-2 rounded-full border-2 border-yellow-400 text-yellow-600  hover:text-white hover:bg-yellow-400 transition-all duration-200">
                        Medium
                    </div>
                    <div id="ulow" onclick="selectedPriority('low')"
                        class="priority cursor-pointer px-6 py-2 rounded-full border-2 border-green-500 text-green-500 hover:text-white hover:bg-green-500 transition-all duration-200">
                        Low
                    </div>
                </div>
                <h2 class="text-2xl font-bold">Status: </h2>
                <div class="flex gap-4">
                    <div id="utodo" onclick="selectedStatus()"
                        class="status cursor-pointer px-6 py-2 rounded-full border-2 border-blue-300 text-blue-300 hover:text-white hover:bg-blue-300 transition-all duration-200">
                        Todo
                    </div>
                    <div id="uprogress" onclick="selectedStatus()"
                        class="status cursor-pointer px-6 py-2 rounded-full border-2 border-blue-300 text-blue-300 hover:text-white hover:bg-blue-300 transition-all duration-200">
                        Progress
                    </div>
                    <div id="udone" onclick="selectedStatus()"
                        class="status cursor-pointer px-6 py-2 rounded-full border-2 border-blue-300 text-blue-300 hover:text-white hover:bg-blue-300 transition-all duration-200  ">
                        Done
                    </div>
                </div>

                <div class="flex justify-end gap-3">
                    <div id="cancelUpdate"
                        class="btn bg-red-300 font-bold font-xl rounded-lg px-5 py-3 text-white border text-center border-transparent hover:text-blue-400 hover:bg-transparent hover:border-blue-400 hover:border transition-all duration-150 ">
                        Cancle </div>
                    <div onclick="updateTask()"
                        class="btn bg-blue-300 font-bold font-xl rounded-lg px-5 py-3 text-white border text-center border-transparent hover:text-blue-400 hover:bg-transparent hover:border-blue-400 hover:border transition-all duration-150 ">
                        Update Task </div>
                </div>

            </form>
        </div>
        <!-- END UPDATE -->

        <!-- delete -->
        <div id="deleteTask"
            class="hidden fixed inset-0 w-full h-full z-50 items-center justify-center bg-gray-700 backdrop-blur-sm bg-opacity-50">
            <div class="w-1/3 p-10 bg-white rounded-3xl flex flex-col space-y-6">
                <h2 class="text-2xl font-bold text-center text-red-500">Are you sure ?</h2>
                <div class="flex justify-center"><i class="fa-solid fa-triangle-exclamation text-4xl text-red-500"></i>
                </div>
                <div class="flex justify-center space-x-4">
                    <button id="cancelDelete"
                        class="px-5 py-3 bg-gray-300 text-gray-700 rounded-lg border border-transparent hover:bg-transparent hover:border-gray-300 hover:text-gray-300 transition-all duration-150">
                        Cancel
                    </button>
                    <button id="confirmDelete" onclick="isDelete()"
                        class="px-5 py-3 bg-red-500 text-white rounded-lg bord  er border-transparent hover:bg-transparent hover:border-red-500 hover:text-red-500 transition-all duration-150">
                        Delete
                    </button>
                </div>
            </div>
        </div>
        <!-- end of delete -->

        <!-- end hidden -->

        <div class="w-full min-h-screen space-y-6 bg-blue-400 p-20 relative">
            <div class="flex justify-between items-center ">
                <h1 class="text-5xl font-extrabold text-black">Task list</h1>
                <button id="addTask" class="px-7 py-2 font-bold text-white bg-purple-900 rounded-lg border border-transparent
                hover:bg-transparent hover:border-black hover:text-purple-900 hover:font-extrabold
                transition-all duration-200 ">
                    Add task </button>
            </div>
            <div
                class="m-auto w-4/5 px-10 py-8 bg-white shadow-gray-700 shadow-lg rounded-2xl flex justify-between items-center">
                <div class="font-extrabold text-2xl text-blue-500">My Tasks</div>
                <div class="flex justify-between items-center w-1/2">
                    <p class="font-extrabold text-xl  text-blue-500">Priority</p>
                    <p class="font-extrabold text-xl text-blue-500">Status</p>
                    <p class="font-extrabold text-xl text-orange-500">Actions</p>
                </div>

            </div>
            <div id="taskList" class="space-y-6 flex flex-col"></div>
            <!-- <div class="m-auto w-4/5 px-10 py-10 bg-white rounded-bl-lg rounded-tr-lg flex justify-between items-center">
            <div class="font-extrabold text-2xl">Java Homework</div>
            <div class="flex justify-around items-center w-1/2">
                <p class="font-extrabold text-xl  text-blue-500">High</p>
                <p class="font-extrabold text-xl text-blue-500">Progress</p>
                <div class="flex space-x-2 items-center justify-between">
                    <button class="text-purple-800 text-3xl" onclick="editTask(this)"><i class="fa-regular fa-pen-to-square"></i></button>
                    <button class="text-red-500 text-3xl" onclick="deleteTask(this)"><i class="fa-regular fa-trash-can "></i></button>

                </div>
            </div>
        </div> -->

        </div>
    </div>

    <script src="./js/script.js"></script>
</body>

</html>
